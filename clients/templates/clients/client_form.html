{% extends 'base.html' %}

{% block title %}Ajouter un client{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Ajouter un client</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.nom.id_for_label }}" class="form-label">Nom</label>
                    {{ form.nom }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.telephone.id_for_label }}" class="form-label">Téléphone</label>
                    {{ form.telephone }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.email.id_for_label }}" class="form-label">Email</label>
                    {{ form.email }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.adresse.id_for_label }}" class="form-label">Adresse</label>
                    {{ form.adresse }}
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{% url 'client_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
