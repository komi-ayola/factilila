

{% extends 'base.html' %}

{% block title %}Ajouter un produit{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Ajouter un produit</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.nom.id_for_label }}" class="form-label">Nom</label>
                    {{ form.nom }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.prix_unitaire.id_for_label }}" class="form-label">Prix unitaire (FCFA)</label>
                    {{ form.prix_unitaire }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.description.id_for_label }}" class="form-label">Description</label>
                    {{ form.description }}
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{% url 'produit_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
