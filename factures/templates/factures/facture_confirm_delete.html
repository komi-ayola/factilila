{% extends 'base.html' %}

{% block title %}Supprimer une facture{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Supprimer une facture</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <p>Êtes-vous sûr de vouloir supprimer la facture <strong>{{ facture.numero }}</strong> ?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                <a href="{% url 'facture_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
