{% extends 'base.html' %}

{% block title %}Supprimer un client{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Supprimer un client</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <p>Êtes-vous sûr de vouloir supprimer le client <strong>{{ client.nom }}</strong> ?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                <a href="{% url 'client_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
